version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: edu-code-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edu_code_platform
      MYSQL_USER: edu_user
      MYSQL_PASSWORD: edu_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
